<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROXX EMPIRE | All Art Prints</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F0D060;
            --gold-dark: #9A7D1A;
            --black: #050505;
            --dark: #0a0a0a;
            --dark-2: #111;
            --white: #f5f0e8;
            --transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 20px;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { background: var(--black); position: relative; overflow-x: hidden; cursor: auto; }
        #bg-glow {
            position: fixed; inset: -50%; z-index: -1;
            background: radial-gradient(circle at 30% 40%, rgba(212,175,55,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(212,175,55,0.04) 0%, transparent 45%),
                        radial-gradient(circle at 50% 50%, rgba(10,10,10,0.9) 0%, var(--black) 70%);
            animation: floatGlow 18s ease-in-out infinite alternate;
            pointer-events: none; will-change: transform;
        }
        @keyframes floatGlow {
            0% { transform: translate(0%, 0%) scale(1); }
            100% { transform: translate(-3%, -2%) scale(1.02); }
        }

        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.03; pointer-events: none; z-index: 9999;
        }

        /* ───── NAVIGATION ───── */
        nav {
            position: fixed; top: 0; width: 100%; padding: 22px 60px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(5,5,5,0.85); backdrop-filter: blur(20px);
            z-index: 1000; border-bottom: 1px solid rgba(212,175,55,0.12);
            transition: padding 0.4s ease, background 0.4s ease;
        }
        .nav-logo { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 900; letter-spacing: 6px; color: var(--gold); text-decoration: none; }
        .nav-links { display: flex; gap: 40px; list-style: none; align-items: center; }
        .nav-links a {
            color: rgba(245,240,232,0.55); text-decoration: none; font-size: 0.68rem;
            letter-spacing: 3px; text-transform: uppercase; font-weight: 700; transition: color 0.3s;
            position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 1px; background: var(--gold); transition: width 0.3s ease;
        }
        .nav-links a:hover { color: var(--gold); }
        .nav-links a:hover::after { width: 100%; }
        .nav-cta {
            font-family: 'Montserrat', sans-serif; font-size: 0.65rem; letter-spacing: 3px;
            text-transform: uppercase; font-weight: 700; color: var(--black) !important;
            background: var(--gold); padding: 10px 22px; text-decoration: none;
            transition: var(--transition) !important; border-radius: var(--radius-sm);
        }
        .nav-cta::after { display: none !important; }
        .nav-cta:hover { background: var(--gold-light) !important; }

        .nav-cart-btn {
            background: none; border: 1px solid rgba(212,175,55,0.4); border-radius: 50%;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; position: relative;
            color: var(--gold); margin-left: 16px;
        }
        .nav-cart-btn:hover { border-color: var(--gold); background: rgba(212,175,55,0.08); }
        .nav-cart-btn svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 1.5; }
        .cart-count {
            position: absolute; top: -6px; right: -6px; background: var(--gold); color: var(--black);
            font-size: 0.55rem; font-weight: 900; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif;
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .cart-count.bump { transform: scale(1.4); }

        /* ───── SECTIONS ───── */
        .section-wrap { padding: 140px 60px 100px; max-width: 1400px; margin: 0 auto; }
        .section-label { font-size: 0.6rem; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
        .section-label::before { content: ''; display: block; width: 30px; height: 1px; background: var(--gold); }
        .section-title { font-family: 'Cinzel', serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--white); margin-bottom: 80px; line-height: 1.1; }

        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; }
        @media (max-width: 900px) { .grid-container { grid-template-columns: repeat(2, 1fr); gap: 16px; } }
        @media (max-width: 500px) { .grid-container { grid-template-columns: 1fr; } }

        .product-card {
            position: relative; overflow: hidden; background: var(--dark);
            border-radius: var(--radius-md);
            transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.5s ease;
            will-change: transform, box-shadow;
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.2); }
        .product-card::before {
            content: ''; position: absolute; inset: -20px;
            background: radial-gradient(circle at 50% 30%, rgba(212,175,55,0.25) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.6s ease; z-index: 1; pointer-events: none;
        }
        .product-card:hover::before { opacity: 1; }

        .img-box { width: 100%; height: 400px; overflow: hidden; position: relative; background: #080808; border-radius: var(--radius-md) var(--radius-md) 0 0; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; transition: transform 1.2s cubic-bezier(0.16,1,0.3,1); filter: brightness(0.88) contrast(1.05); }
        .product-card:hover .img-box img { transform: scale(1.06); filter: brightness(0.95) contrast(1.05); }

        .img-box .lightbox-trigger {
            position: absolute; top: 20px; right: 20px; z-index: 5;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(212,175,55,0.4);
            color: var(--gold); display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease;
            cursor: pointer;
        }
        .img-box:hover .lightbox-trigger { opacity: 1; }
        .img-box .lightbox-trigger:hover { transform: scale(1.1); background: rgba(0,0,0,0.8); border-color: var(--gold); }

        .img-box::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%); z-index: 1; pointer-events: none; }
        .img-placeholder { width: 100%; height: 400px; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; border: 1px dashed rgba(212,175,55,0.15); border-radius: var(--radius-md) var(--radius-md) 0 0; }
        .img-placeholder span { font-size: 0.55rem; letter-spacing: 4px; color: rgba(212,175,55,0.3); text-transform: uppercase; }
        .placeholder-icon { width: 48px; height: 48px; border: 1px solid rgba(212,175,55,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: rgba(212,175,55,0.3); font-size: 1.2rem; }

        .product-info { padding: 24px 24px 32px; position: relative; border-top: 1px solid rgba(212,175,55,0.1); display: flex; flex-direction: column; gap: 6px; border-radius: 0 0 var(--radius-md) var(--radius-md); }
        .product-category { font-size: 0.55rem; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; font-weight: 700; }
        .product-name { font-family: 'Cinzel', serif; font-size: 0.95rem; font-weight: 600; letter-spacing: 2px; color: var(--white); text-transform: uppercase; }
        .product-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
        .product-price { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; color: var(--gold); letter-spacing: 1px; }

        .btn-primary { display: inline-flex; align-items: center; gap: 10px; padding: 10px 20px; font-family: 'Montserrat', sans-serif; font-size: 0.55rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; border-radius: var(--radius-sm); will-change: transform; background: var(--gold); color: var(--black); border: none; }
        .btn-primary::before { content: ''; position: absolute; inset: 0; background: var(--gold-light); transform: translateX(-100%); transition: transform 0.4s ease; }
        .btn-primary:hover::before { transform: translateX(0); }
        .btn-primary span { position: relative; z-index: 1; }
        .btn-icon { display: inline-block; transition: transform 0.3s ease; }
        .btn-primary:hover .btn-icon { transform: translateX(4px); }

        /* Cart panel styles (abbreviated, same as index) */
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100001; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease; }
        .cart-overlay.active { opacity: 1; visibility: visible; }
        .cart-panel { position: fixed; top: 0; right: -450px; width: 420px; height: 100vh; background: var(--dark); z-index: 100002; border-left: 1px solid rgba(212,175,55,0.15); padding: 30px; display: flex; flex-direction: column; transition: right 0.5s cubic-bezier(0.16,1,0.3,1); border-radius: var(--radius-lg) 0 0 var(--radius-lg); overflow-y: auto; }
        .cart-panel.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid rgba(212,175,55,0.1); margin-bottom: 30px; }
        .cart-header h3 { font-family: 'Cinzel', serif; font-size: 1.2rem; font-weight: 600; letter-spacing: 3px; color: var(--gold); }
        .cart-close { font-size: 1.5rem; color: rgba(245,240,232,0.5); cursor: pointer; transition: color 0.3s; background: none; border: none; font-family: 'Montserrat', sans-serif; font-weight: 300; }
        .cart-close:hover { color: var(--gold); }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.03); align-items: center; }
        .cart-item-img { width: 60px; height: 60px; background: #080808; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: rgba(212,175,55,0.3); font-size: 0.7rem; border: 1px solid rgba(212,175,55,0.1); border-radius: var(--radius-sm); }
        .cart-item-details h4 { font-family: 'Cinzel', serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; color: var(--white); }
        .cart-item-details span { font-size: 0.55rem; letter-spacing: 2px; color: rgba(245,240,232,0.3); text-transform: uppercase; }
        .cart-item-price { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--gold); }
        .cart-remove { color: rgba(245,240,232,0.2); cursor: pointer; transition: color 0.3s; font-size: 0.8rem; background: none; border: none; padding: 5px; }
        .cart-remove:hover { color: #c0392b; }
        .cart-total { padding-top: 20px; border-top: 1px solid rgba(212,175,55,0.15); margin-top: 20px; display: flex; justify-content: space-between; align-items: center; font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 600; letter-spacing: 2px; color: var(--white); }
        .cart-total .total-price { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; }
        .cart-empty { text-align: center; padding: 60px 0; color: rgba(245,240,232,0.2); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; letter-spacing: 2px; }
        .btn-checkout { display: block; width: 100%; text-align: center; padding: 16px; background: var(--gold); color: var(--black); font-family: 'Montserrat', sans-serif; font-size: 0.6rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; border: none; cursor: pointer; transition: background 0.3s; margin-top: 20px; border-radius: var(--radius-sm); }
        .btn-checkout:hover { background: var(--gold-light); }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--dark); border: 1px solid var(--gold); color: var(--white); padding: 14px 28px; z-index: 200000; font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 700; transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); border-radius: var(--radius-sm); pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 200001; }

        .reveal {
            opacity: 0; transform: scale(0.95) translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.25,0.46,0.45,0.94),
                        transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
            will-change: opacity, transform;
        }
        .reveal.visible { opacity: 1; transform: scale(1) translateY(0); }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }
    </style>
</head>
<body>
    <div id="bg-glow"></div>
    <div class="toast" id="toast"></div>

    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header"><h3>Your Bag</h3><button class="cart-close" id="cartClose">&times;</button></div>
        <div class="cart-items" id="cartItems"><p class="cart-empty">Your bag is empty.</p></div>
        <div>
            <div class="cart-total"><span>Total</span><span class="total-price" id="cartTotal">$0.00</span></div>
            <button class="btn-checkout" id="btnCheckout">Checkout</button>
        </div>
    </div>
    <canvas id="confetti-canvas"></canvas>

    <nav>
        <a href="index.html" class="nav-logo">ROXX EMPIRE</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="art-collection.html">Art</a></li>
            <li><a href="apparel-collection.html">Apparel</a></li>
            <li><a href="index.html#about-section">Brand</a></li>
        </ul>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="art-collection.html" class="nav-cta">Shop Now</a>
            <button class="nav-cart-btn" id="navCartBtn" aria-label="Open cart">
                <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                <span class="cart-count" id="cartCount" style="display:none;">0</span>
            </button>
        </div>
    </nav>

    <div class="section-wrap">
        <div class="reveal">
            <p class="section-label">01 — Full Collection</p>
            <h2 class="section-title">All Art Prints</h2>
        </div>
        <div class="grid-container" id="art-full-grid"></div>
    </div>

    <script>
        const fallbackProducts = {"art":[]};
        async function loadArt() {
            try {
                const res = await fetch('products.json');
                const data = res.ok ? await res.json() : fallbackProducts;
                const grid = document.getElementById('art-full-grid');
                grid.innerHTML = '';
                (data.art || []).forEach((item, i) => {
                    const card = document.createElement('div');
                    card.className = 'product-card reveal reveal-delay-' + ((i % 4) + 1);
                    const imgHTML = item.image
                        ? `<div class="lightbox-trigger" title="View full size">⛶</div><img src="${item.image}" alt="${item.name}">`
                        : `<div class="placeholder-icon">◈</div><span>Image Coming Soon</span>`;
                    card.innerHTML = `
                        <div class="img-box ${item.image ? '' : 'img-placeholder'}" data-full-img="${item.image||''}">${imgHTML}</div>
                        <div class="product-info">
                            <span class="product-category">${item.category}</span>
                            <h3 class="product-name">${item.name}</h3>
                            <div class="product-bottom">
                                <span class="product-price">$${item.price.toFixed(2)}</span>
                                <button class="btn-primary add-to-cart" data-name="${item.name}" data-price="${item.price}"><span>Add to Bag</span><span class="btn-icon">→</span></button>
                            </div>
                        </div>`;
                    grid.appendChild(card);
                });
                attachProductListeners();
                observeReveals();
            } catch {}
        }
        loadArt();
    </script>

</body>
